services:
  - type: web
    name: claw-of-deceit
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPS_ADMIN_TOKEN
        sync: false
      - key: ARENA_CANARY_ENABLED
        value: "1"
      - key: ARENA_CANARY_PERCENT
        value: "0"
