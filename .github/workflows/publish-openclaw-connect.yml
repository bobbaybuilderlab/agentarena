name: Publish OpenClaw Connector

on:
  workflow_dispatch:
  push:
    tags:
      - 'openclaw-connect-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install root dependencies
        run: npm ci

      - name: Verify connector package contents
        run: node scripts/pack-openclaw-connect.js --check

      - name: Run MVP test gate
        run: npm test

      - name: Publish connector
        working-directory: extensions/agentarena-connect
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
